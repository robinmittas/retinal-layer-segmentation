fail_fast: false
default_language_version:
    python: python3
default_stages:
    - pre-commit
    - pre-push
minimum_pre_commit_version: 2.16.0
repos:
    - repo: https://github.com/psf/black
      rev: "23.1.0"
      hooks:
          - id: black
            args: ["--line-length=88"]
    - repo: https://github.com/asottile/blacken-docs
      rev: 1.13.0
      hooks:
          - id: blacken-docs
    - repo: https://github.com/PyCQA/isort
      rev: 5.12.0
      hooks:
          - id: isort
            args: ["--profile", "black"]
    - repo: https://github.com/charliermarsh/ruff-pre-commit #https://github.com/astral-sh/ruff-pre-commit
      rev: v0.4.4
      hooks:
          - id: ruff
            args: [--fix, --exit-non-zero-on-fix]
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.4.0
      hooks:
          - id: detect-private-key
          - id: check-ast
          - id: end-of-file-fixer
          - id: mixed-line-ending
            args: [--fix=crlf]
          - id: trailing-whitespace
          - id: check-case-conflict
    - repo: https://github.com/nbQA-dev/nbQA
      rev: 1.9.1  # Check for latest version
      hooks:
        - id: nbqa-isort
        - id: nbqa-black
        - id: nbqa-pyupgrade
        - id: nbqa-ruff
    #- repo: https://github.com/DanielNoord/pydocstringformatter
    #  rev: v0.7.3 # Use the latest stable version
    #  hooks:
    #    - id: pydocstringformatter
          # You can specify styles, e.g., --style=google or --style=numpydoc
          # args: [--style=google]

    #- repo: https://github.com/jsh9/pydoclint
    #  rev: 0.6.7 # Use the latest stable version
    #  hooks:
    #    - id: pydoclint
    #     args: [--style=google] # Or --style=numpy, etc.

    #- repo: https://github.com/PyCQA/docformatter
    #  rev: v1.7.7  # Latest as of writing
    #  hooks:
    #    - id: docformatter
    #      args: ["--in-place", "--wrap-summaries", "88", "--wrap-descriptions", "88", "--pre-summary-newline"]

    - repo: local
      hooks:
          - id: forbid-to-commit
            name: Don't commit rej files
            entry: |
                Cannot commit .rej files. These indicate merge conflicts that arise during automated template updates.
                Fix the merge conflicts manually and remove the .rej files.
            language: fail
            files: '.*\.rej$'
